        object: ru/services/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /{path+}:
    get:
      parameters:
        - { name: path, in: path, required: true, schema: { type: string } }
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: "{path}"
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
