# API Gateway: /api/lead → Cloud Function; статика → Object Storage (object_storage).
# Важно: ключи маршрутов каталогов БЕЗ завершающего слэша — YC срезает его из запроса
# (/ru/ → /ru), иначе запрос уходит в greedy /{path+}. Плейсхолдеры подставляет provision.sh.
openapi: 3.0.0
info: { title: ostvera, version: "1.0" }
paths:
  /api/lead:
    post:
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: <FUNCTION_ID>
        tag: "$latest"
        service_account_id: <SERVICE_ACCOUNT_ID>
    options:
      x-yc-apigateway-integration:
        type: cloud_functions
        function_id: <FUNCTION_ID>
        tag: "$latest"
        service_account_id: <SERVICE_ACCOUNT_ID>
  /:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /en:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: en/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /en/about:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: en/about/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /en/consent:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: en/consent/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /en/contacts:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: en/contacts/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /en/cookie:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: en/cookie/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /en/offer:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: en/offer/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /en/privacy:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: en/privacy/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /en/services:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: en/services/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /ru:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: ru/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /ru/about:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: ru/about/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /ru/consent:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: ru/consent/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /ru/contacts:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: ru/contacts/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /ru/cookie:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: ru/cookie/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /ru/offer:
    get:
      x-yc-apigateway-integration:
        type: object_storage
        bucket: <BUCKET_NAME>
        object: ru/offer/index.html
        error_object: 404.html
        service_account_id: <SERVICE_ACCOUNT_ID>
  /ru/privacy:
    get:
      x-yc-apigateway-integration:
        type: object_storage
