<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>404 — Ostvera</title>
  <style>
    :root{--paper:#F6F6F3;--ink:#111512;--anchor:#0E4A4A;--muted:#6B7069}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:var(--paper);color:var(--ink);
      font-family:system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;text-align:center;padding:24px}
    .n{font-size:clamp(64px,14vw,140px);font-weight:800;letter-spacing:-.03em;line-height:1;color:var(--anchor)}
    p{margin:18px 0 28px;color:var(--muted);font-size:17px}
    .links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
    a{display:inline-block;padding:13px 22px;border:1px solid var(--ink);border-radius:2px;
      text-decoration:none;color:var(--ink);font-size:14px;letter-spacing:.04em;text-transform:uppercase}
    a.primary{background:var(--anchor);border-color:var(--anchor);color:#fff}
  </style>
</head>
<body>
  <div>
    <div class="n">404</div>
    <p>Страница не найдена · Page not found</p>
    <div class="links">
      <a class="primary" href="/ru/">На главную</a>
      <a href="/en/">Home (EN)</a>
    </div>
  </div>
</body>
</html>
